name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    name: macOS (Metal)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DLAMBDA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j "$(sysctl -n hw.ncpu)"

      - name: Test
        run: ctest --test-dir build --output-on-failure

  linux-wayland:
    name: Linux (Wayland/Vulkan)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build pkg-config \
            libwayland-dev wayland-protocols \
            libxkbcommon-dev libvulkan-dev glslang-tools mesa-vulkan-drivers \
            libfreetype-dev libfontconfig-dev libharfbuzz-dev zlib1g-dev \
            libdrm-dev libinput-dev libudev-dev libseat-dev libsystemd-dev \
            librsvg2-dev perl

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLAMBDA_PLATFORM=LINUX_WAYLAND
          -DLAMBDA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Vulkan shader headers
        run: cmake --build build --target lambda_vulkan_shaders_check

      - name: Vulkan tests (lavapipe)
        run: |
          if [ -f /usr/share/vulkan/icd.d/lvp_icd.x86_64.json ]; then
            # "Compositor*" picks up the glass-material cases in
            # VulkanRenderTargetTests.cpp whose names lack "Vulkan".
            VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json \
              ./build/lambda/tests/lambda-tests --test-case="*Vulkan*,Compositor*"
          else
            echo "lavapipe ICD not found; skipping Vulkan tests"
          fi

      # Keep the display-independent reactive suite as a fast Linux smoke test.
      - name: Reactive tests
        run: ./build/lambda/tests/lambda-tests --test-case="Reactive *"

      - name: Module dependency check
        run: ./lambda/scripts/check_module_dependencies.sh
